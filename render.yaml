services:
  - type: web
    name: yantu-backend
    runtime: python
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: OPENAI_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
